<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAD - AR Edge Projection</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">
        <!-- Floating UI Wrapper for WebXR dom-overlay compatibility -->
        <div id="ui-wrapper">
            <div class="overlay glass" id="main-header">
                <h1>DCAD | AR Projection</h1>
                <p>Proyecta bordes de objetos CAD en la realidad.</p>
            </div>

            <!-- Floating UI Toggles -->
            <button id="refresh-btn" class="fab-btn refresh" title="Recargar App">
                <span class="icon">↻</span>
            </button>
            <button id="menu-toggle" class="fab-btn">
                <span class="icon">☰</span>
            </button>

            <!-- Barra de Navegación Unificada (Panel | AR | Actualizar) -->
            <div id="unified-bottom-controls" class="bottom-controls-bar">
                <button id="quick-panel-btn" class="ui-action-btn">📂 Panel</button>
                
                <!-- Este botón cambia según el modo -->
                <button id="start-ar-custom-btn" class="ui-action-btn primary">🚀 Entrar AR</button>
                <button id="ar-exit-btn" class="ui-action-btn exit ar-only-btn">🚪 Salir AR</button>
                
                <button id="refresh-btn-unified" class="ui-action-btn">🔄 Actualizar</button>
            </div>

            <div id="ui-container">
            <!-- Tab Navigation (Tabs are now secondary or inside panel) -->
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="tab-move">🏠 Mover</button>
                <button class="tab-btn" data-tab="tab-rotate">🔄 Rotar</button>
                <button class="tab-btn" data-tab="tab-align">📍 Alineación</button>
                <button class="tab-btn" data-tab="tab-models">📦 Modelos</button>
                <button class="tab-btn" data-tab="tab-console">💾</button>
            </div>

            <!-- Tab Contents -->
            <div id="tab-move" class="tab-panel active">
                <div class="glass adjustment-panel" id="adj-panel-move">
                    <div class="panel-header">
                        <h2>Mover Modelo</h2>
                    </div>
                    <div class="panel-controls">
                        <div class="control-row">
                            <span>Posición (X, Y, Z):</span>
                            <div class="nudge-group">
                                <button class="nudge-btn" data-axis="x" data-dir="1">X+</button>
                                <button class="nudge-btn" data-axis="x" data-dir="-1">X-</button>
                                <button class="nudge-btn" data-axis="y" data-dir="1">Y+</button>
                                <button class="nudge-btn" data-axis="y" data-dir="-1">Y-</button>
                                <button class="nudge-btn" data-axis="z" data-dir="1">Z+</button>
                                <button class="nudge-btn" data-axis="z" data-dir="-1">Z-</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-rotate" class="tab-panel">
                <div class="glass adjustment-panel" id="adj-panel-rotate">
                    <div class="panel-header">
                        <h2>Rotar Modelo</h2>
                    </div>
                    <div class="panel-controls">
                        <div class="control-row">
                            <span>Rotación (X, Y, Z):</span>
                            <div class="nudge-group">
                                <button class="nudge-btn" data-axis="rx" data-dir="1">RX+</button>
                                <button class="nudge-btn" data-axis="rx" data-dir="-1">RX-</button>
                                <button class="nudge-btn" data-axis="ry" data-dir="1">RY+</button>
                                <button class="nudge-btn" data-axis="ry" data-dir="-1">RY-</button>
                                <button class="nudge-btn" data-axis="rz" data-dir="1">RZ+</button>
                                <button class="nudge-btn" data-axis="rz" data-dir="-1">RZ-</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-align" class="tab-panel">
                <div class="glass adjustment-panel">
                    <h2 style="margin: 0; font-size: 1rem; color: #60a5fa;">Alineación de 3 Puntos</h2>

                    <div class="control-row" style="flex-direction: row; align-items: center; gap: 10px;">
                        <span style="min-width: 60px;">Modelo:</span>
                        <div class="nudge-group" style="grid-template-columns: repeat(3, 1fr); flex: 1;">
                            <button id="p-mod-1" class="point-btn" data-type="model" data-idx="0">M1: ---</button>
                            <button id="p-mod-2" class="point-btn" data-type="model" data-idx="1">M2: ---</button>
                            <button id="p-mod-3" class="point-btn" data-type="model" data-idx="2">M3: ---</button>
                        </div>
                    </div>

                    <div class="control-row" style="margin-top: 10px; flex-direction: row; align-items: center; gap: 10px;">
                        <span style="min-width: 60px;">Realidad:</span>
                        <div class="nudge-group" style="grid-template-columns: repeat(3, 1fr); flex: 1;">
                            <button id="p-real-1" class="point-btn" data-type="real" data-idx="0">R1: ---</button>
                            <button id="p-real-2" class="point-btn" data-type="real" data-idx="1">R2: ---</button>
                            <button id="p-real-3" class="point-btn" data-type="real" data-idx="2">R3: ---</button>
                        </div>
                    </div>

                    <div class="control-row" style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
                        <span style="display: flex; justify-content: space-between;">
                            Desfase de selección (px): <span id="offset-val-display">10</span>
                        </span>
                        <input type="range" id="drag-offset-input" min="0.1" max="100" step="0.1" value="10" style="padding: 0;">
                    </div>

                    <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button id="btn-calculate-align" style="background: #10b981;">Alinear</button>
                        <button id="btn-reset-align" style="background: #ef4444;">Reset</button>
                    </div>
                </div>
            </div>

            <div id="tab-models" class="tab-panel">
                <div class="glass examples-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h2 style="margin: 0;">Modelos Cargados</h2>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-size: 0.8rem; opacity: 0.8;">Ver Sólido</span>
                            <label class="switch">
                                <input type="checkbox" id="shading-toggle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="loaded-models-list" class="model-list">
                        <!-- Items will be generated here -->
                    </div>
                    <div style="margin-top: 15px;">
                        <input type="file" id="model-upload" accept=".glb,.gltf,.dwg,.ifc" hidden>
                        <button id="upload-btn" style="width: 100%; padding: 0.6rem;">Subir Archivo</button>
                    </div>
                </div>
            </div>


            <div id="tab-console" class="tab-panel">
                <div class="glass console-panel">
                    <h2>Terminal</h2>
                    <div id="debug-content" class="tab-debug-content">
                        <div>--- Sistema Iniciado ---</div>
                    </div>
                </div>
            </div>
            </div>
        </div>

        <div id="canvas-container"></div>
    <script type="module" src="/main.js"></script>
</body>

</html>
